<body class="font-sans text-slate-800 antialiased">
  <div id="app" class="mx-auto w-full max-w-md px-4 pb-24 pt-5 sm:max-w-lg"></div>
  <canvas id="fx" class="pointer-events-none fixed inset-0 z-50 hidden h-full w-full"></canvas>
  <div id="toast" class="pointer-events-none fixed bottom-6 left-1/2 z-[60] -translate-x-1/2 opacity-0 transition-all duration-300"></div>

<script>
/* ============================================================
   VocaTest (보카테스트) — 원격 영단어 테스트 (Single File)
   - 선생님: 단어장 관리 · 테스트 생성 · 세션 관리(만료)
   - 학생: 링크 접속 → 4지선다 / 스펠링 → 오답 무한반복 → 결과카드
   ============================================================ */

/* ---------- 저장소 ---------- */
const DB = {
  words()   {
    let arr; try{ arr = JSON.parse(localStorage.getItem('vpang.words')||'[]') }catch(e){ arr=[] }
    let changed=false;
    arr.forEach(w=>{ if(!w.id){ w.id=uid(8); changed=true; } if(w.folderId===undefined){ w.folderId=null; changed=true; } });
    if(changed) localStorage.setItem('vpang.words', JSON.stringify(arr));
    return arr;
  },
  saveWords(w){ localStorage.setItem('vpang.words', JSON.stringify(w)); },
  folders() { try{ return JSON.parse(localStorage.getItem('vpang.folders')||'[]') }catch(e){ return [] } },
  saveFolders(f){ localStorage.setItem('vpang.folders', JSON.stringify(f)); },
  sessions(){ try{ return JSON.parse(localStorage.getItem('vpang.sessions')||'[]') }catch(e){ return [] } },
  saveSessions(s){ localStorage.setItem('vpang.sessions', JSON.stringify(s)); },
};

/* ---------- 유틸 ---------- */
const $ = (sel, el=document) => el.querySelector(sel);
const app = document.getElementById('app');

function uid(n=10){
  const c='abcdefghijkmnpqrstuvwxyz23456789';
  let s=''; for(let i=0;i<n;i++) s+=c[Math.floor(Math.random()*c.length)];
  return s;
}
function esc(str){ return String(str??'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------- 폴더 유틸 (상위/하위 폴더 트리) ---------- */
function folderChildren(folders, parentId){ return folders.filter(f=>(f.parentId||null)===(parentId||null)); }
function folderDescendantIds(folders, id){ // id(자기 자신) + 모든 하위 폴더 id
  const ids=[id]; let frontier=[id];
  while(frontier.length){
    const next = folders.filter(f=>frontier.includes(f.parentId)).map(f=>f.id);
    ids.push(...next); frontier=next;
  }
  return ids;
}
function folderPath(folders, id){ // 최상위→id 순 breadcrumb
  const path=[]; let cur=folders.find(f=>f.id===id);
  while(cur){ path.unshift(cur); cur=folders.find(f=>f.id===cur.parentId); }
  return path;
}
// folderId===null → 전체(모든 단어), recursive=true면 하위 폴더까지 포함
function wordsInFolder(words, folders, folderId, recursive=true){
  if(folderId==null) return recursive ? words.slice() : words.filter(w=>(w.folderId||null)===null);
  const ids = recursive ? folderDescendantIds(folders, folderId) : [folderId];
  return words.filter(w=> ids.includes(w.folderId||null));
}
// folderIds가 배열(여러 폴더 동시 선택) → 각 폴더(+하위)의 합집합. null/빈 배열이면 전체 단어
function wordsInFolders(words, folders, folderIds, recursive=true){
  if(!folderIds || !folderIds.length) return recursive ? words.slice() : words.filter(w=>(w.folderId||null)===null);
  const idSet = new Set();
  folderIds.forEach(fid=> (recursive? folderDescendantIds(folders, fid) : [fid]).forEach(x=>idSet.add(x)));
  return words.filter(w=> idSet.has(w.folderId||null));
}
function folderTreeFlat(folders){ // 들여쓰기용 depth 포함 평탄화 목록 (전체 펼침, 모달용)
  const list=[];
  (function walk(parentId, depth){
    folderChildren(folders, parentId).forEach(f=>{ list.push({...f, depth}); walk(f.id, depth+1); });
  })(null,0);
  return list;
}
// 트리 뷰용: expanded 에 담긴 폴더만 하위를 펼쳐서 보여주는 "현재 보이는" 목록 (shift 범위선택 기준)
function visibleFolderRows(folders, expanded){
  const list=[];
  (function walk(parentId, depth){
    folderChildren(folders, parentId).forEach(f=>{
      list.push({...f, depth});
      if(expanded.has(f.id)) walk(f.id, depth+1);
    });
  })(null,0);
  return list;
}
// id를 newParentId 밑으로 옮겨도 사이클(자기 자신의 하위로 들어가기)이 안 생기는지 검사
function canReparent(folders, folderId, newParentId){
  if(newParentId===folderId) return false;
  return !folderDescendantIds(folders, folderId).includes(newParentId);
}
// 폴더 id 목록을 targetId 밑으로 재배치. 사이클이 생기는 건 건너뜀. { moved, blocked } 반환
function reparentFolders(ids, targetId){
  const folders = DB.folders();
  let moved=0, blocked=0;
  ids.forEach(id=>{
    const f = folders.find(x=>x.id===id);
    if(!f || (f.parentId||null)===(targetId||null) || id===targetId) return;
    if(!canReparent(folders, id, targetId||null)){ blocked++; return; }
    f.parentId = targetId||null; moved++;
  });
  if(moved) DB.saveFolders(folders);
  return { moved, blocked };
}
// 폴더(+하위 폴더+단어) 전체를 새 id로 복제해 newParentId 밑에 붙임. 최상위 이름엔 '복사본' 표시
function cloneFolderTree(folders, words, srcId, newParentId){
  const newFolders=[], newWords=[];
  (function walk(fid, parentId, isRoot){
    const orig = folders.find(f=>f.id===fid); if(!orig) return;
    const nf = { id:uid(8), name: isRoot? `${orig.name} 복사본` : orig.name, parentId };
    newFolders.push(nf);
    words.filter(w=>(w.folderId||null)===fid).forEach(w=> newWords.push({ id:uid(8), en:w.en, ko:w.ko, folderId:nf.id }));
    folderChildren(folders, fid).forEach(c=> walk(c.id, nf.id, false));
  })(srcId, newParentId||null, true);
  return { newFolders, newWords };
}
// 폴더 클립보드({ids, mode:'copy'|'cut'})를 targetId 밑에 붙여넣기. 결과 요약 반환
function pasteFolderClipboard(clip, targetId){
  if(!clip || !clip.ids || !clip.ids.length) return null;
  if(clip.mode==='cut'){
    const { moved, blocked } = reparentFolders(clip.ids, targetId);
    return { mode:'cut', moved, blocked };
  }
  const folders=DB.folders(), words=DB.words();
  let addF=[], addW=[];
  clip.ids.forEach(id=>{
    if(!folders.find(f=>f.id===id)) return;
    const { newFolders, newWords } = cloneFolderTree(folders, words, id, targetId);
    addF=addF.concat(newFolders); addW=addW.concat(newWords);
  });
  if(addF.length) DB.saveFolders(folders.concat(addF));
  if(addW.length) DB.saveWords(words.concat(addW));
  return { mode:'copy', count: clip.ids.length };
}

// UTF-8 안전 Base64 (URL-safe)
function b64enc(obj){
  const json = JSON.stringify(obj);
  const b = btoa(unescape(encodeURIComponent(json)));
  return b.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64dec(str){
  try{
    let s = str.replace(/-/g,'+').replace(/_/g,'/');
    while(s.length%4) s+='=';
    return JSON.parse(decodeURIComponent(escape(atob(s))));
  }catch(e){ return null; }
}

/* ---------- 무결성 서명 (URL 위·변조 방지) ---------- */
// 이 값은 링크의 만료일/단어를 학생이 임의로 바꾸지 못하게 막는 열쇠입니다.
// 공유 전에 아래 문자열을 본인만의 값으로 바꾸면 보안이 더 강해집니다.
const SIG_SALT = 'Nv7LPd2SLBowr045trlk3AWbrUt17dHu';
function fnv1a(str){ // 결정적 32bit 해시 → base36
  let h = 0x811c9dc5;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); }
  return (h>>>0).toString(36);
}
function sigString(p){
  const w = (p.w||[]).map(x=>x.e+'\u241f'+x.k).join('\u241e');
  return [SIG_SALT, p.s, p.exp||0, p.mode, p.sec, p.dm||'', p.dv||'', p.dt||'', w].join('\u2016');
}
function signPayload(p){ return { ...p, g: fnv1a(sigString(p)) }; } // 서명 붙인 payload 객체 반환
function buildLink(p){ // p: sig 없는 payload → 서명 붙여 링크 반환
  const signed = signPayload(p);
  return location.origin + location.pathname + '?session=' + p.s + '&d=' + b64enc(signed);
}
function verifyPayload(p){
  if(!p || !p.g) return false;
  const { g, ...rest } = p;
  return fnv1a(sigString(rest)) === g;
}

/* ---------- 영단어 → 뜻 자동 번역 (EN→KO) ---------- */
async function translateWord(en){
  const q = encodeURIComponent(en.trim());
  // 1순위: Google 번역(gtx) — 단어 번역 품질이 좋음
  try{
    const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${q}`);
    if(r.ok){
      const j = await r.json();
      const t = (j && j[0] ? j[0].map(x=>x[0]).join('') : '').trim();
      if(t && t.toLowerCase()!==en.trim().toLowerCase()) return t;
    }
  }catch(e){}
  // 2순위: MyMemory (무료·키 불필요)
  try{
    const r = await fetch(`https://api.mymemory.translated.net/get?q=${q}&langpair=en|ko`);
    if(r.ok){
      const j = await r.json();
      const t = (j && j.responseData ? (j.responseData.translatedText||'') : '').trim();
      if(t && !/^[a-zA-Z\s]+$/.test(t)) return t; // 영어 그대로 돌아오면 실패로 간주
    }
  }catch(e){}
  return null;
}

/* ---------- 결과 서버 전송 (구글시트 웹훅) ---------- */
function newToken(){ return uid(20); }
function deliveryCfg(){
  let c=null;
  try{ c=JSON.parse(localStorage.getItem('vpang.delivery')||'null'); }catch(e){}
  if(!c) c = { mode:'hook', url:'', token:newToken() };
  if(!c.token) c.token = newToken();     // 기존 설정 마이그레이션
  if(c.mode==='ntfy') c.mode='hook';      // 구글시트 전용으로 통일
  localStorage.setItem('vpang.delivery', JSON.stringify(c));
  return c;
}
function saveDelivery(c){ localStorage.setItem('vpang.delivery', JSON.stringify(c)); }

// 학생 완료 시 결과 전송. dm:'hook'|'', dv:웹훅 URL, dt:비밀 토큰
async function sendResult(dm, dv, dt, result){
  try{
    if(dm==='hook' && dv){
      // 구글 Apps Script 웹훅: CORS 프리플라이트 회피 위해 text/plain + no-cors
      await fetch(dv, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'},
                        body:JSON.stringify({ ...result, token: dt||'' }) });
      return true; // no-cors는 응답 확인 불가 → 전송 시도 성공으로 간주
    }
  }catch(e){}
  return false;
}

// JSONP GET (Apps Script 응답을 CORS 제약 없이 읽기 위함 — <script> 태그는 CORS 대상이 아님)
// 응답이 콜백(payload)로 안 오거나 타임아웃되면 null
function jsonpFetch(url, timeoutMs=10000){
  return new Promise(resolve=>{
    const cbName = '__vt_cb_' + uid(8);
    const script = document.createElement('script');
    let settled = false;
    const cleanup = ()=>{ delete window[cbName]; script.remove(); clearTimeout(timer); };
    window[cbName] = (data)=>{ if(settled) return; settled=true; cleanup(); resolve(data); };
    const timer = setTimeout(()=>{ if(settled) return; settled=true; cleanup(); resolve(null); }, timeoutMs);
    script.onerror = ()=>{ if(settled) return; settled=true; cleanup(); resolve(null); };
    script.src = url + (url.includes('?')?'&':'?') + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}

// 앱 내부 확인창 (브라우저 confirm이 차단되는 환경 대비)
function askConfirm(msg, okLabel='삭제'){
  return new Promise(resolve=>{
    const ov=document.createElement('div');
    ov.className='fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/40 p-6 anim-in';
    ov.innerHTML=`<div class="w-full max-w-xs rounded-3xl bg-white p-6 shadow-card">
      <p class="mb-5 whitespace-pre-line text-center text-sm font-bold leading-relaxed text-slate-700">${esc(msg)}</p>
      <div class="grid grid-cols-2 gap-2">
        <button id="cf-no" class="btn3d bg-slate-100 py-3 text-sm font-bold text-slate-500" style="--btn-edge:#e2e8f0">취소</button>
        <button id="cf-yes" class="btn3d bg-coral-500 py-3 text-sm font-bold text-white" style="--btn-edge:#e11d48">${esc(okLabel)}</button>
      </div></div>`;
    document.body.appendChild(ov);
    const done=(v)=>{ ov.remove(); resolve(v); };
    ov.querySelector('#cf-no').onclick=()=>done(false);
    ov.querySelector('#cf-yes').onclick=()=>done(true);
    ov.addEventListener('click',e=>{ if(e.target===ov) done(false); });
  });
}

// 앱 내부 텍스트 입력창 (native prompt 대체 — 폴더 이름 등)
function askPrompt(msg, placeholder='', okLabel='확인', defVal=''){
  return new Promise(resolve=>{
    const ov=document.createElement('div');
    ov.className='fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/40 p-6 anim-in';
    ov.innerHTML=`<div class="w-full max-w-xs rounded-3xl bg-white p-6 shadow-card">
      <p class="mb-3 whitespace-pre-line text-center text-sm font-bold leading-relaxed text-slate-700">${esc(msg)}</p>
      <input id="pf-input" value="${esc(defVal)}" placeholder="${esc(placeholder)}" class="mb-4 w-full rounded-xl border-2 border-slate-100 bg-slate-50 px-4 py-3 text-center font-semibold outline-none focus:border-brand-400" />
      <div class="grid grid-cols-2 gap-2">
        <button id="pf-no" class="btn3d bg-slate-100 py-3 text-sm font-bold text-slate-500" style="--btn-edge:#e2e8f0">취소</button>
        <button id="pf-yes" class="btn3d bg-brand-500 py-3 text-sm font-bold text-white" style="--btn-edge:#4338ca">${esc(okLabel)}</button>
      </div></div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector('#pf-input');
    setTimeout(()=>{ inp.focus(); inp.select(); },30);
    const done=(v)=>{ ov.remove(); resolve(v); };
    ov.querySelector('#pf-no').onclick=()=>done(null);
    ov.querySelector('#pf-yes').onclick=()=>done(inp.value.trim());
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); done(inp.value.trim()); } });
    ov.addEventListener('click',e=>{ if(e.target===ov) done(null); });
  });
}

// 폴더 선택창 (단어 이동 / 테스트 출제범위 선택 공용)
function pickFolderModal(folders, title='폴더 선택', words=DB.words()){
  return new Promise(resolve=>{
    const tree = folderTreeFlat(folders);
    const rootCnt = words.length;
    const ov=document.createElement('div');
    ov.className='fixed inset-0 z-[70] flex items-end justify-center bg-slate-900/40 p-4 sm:items-center anim-in';
    ov.innerHTML=`<div class="max-h-[70vh] w-full max-w-xs overflow-y-auto rounded-3xl bg-white p-5 shadow-card">
      <p class="mb-3 text-center text-sm font-black text-slate-700">${esc(title)}</p>
      <div class="flex flex-col gap-1.5">
        <button data-pick="" class="rounded-xl bg-brand-50 px-3 py-2.5 text-left text-sm font-bold text-brand-700">📚 전체 단어장 <span class="text-xs font-normal text-brand-400">(${rootCnt})</span></button>
        ${tree.map(f=>{
          const cnt = wordsInFolder(words, folders, f.id, true).length;
          return `<button data-pick="${f.id}" style="padding-left:${12+f.depth*16}px" class="rounded-xl px-3 py-2.5 text-left text-sm font-bold text-slate-600 hover:bg-slate-50">📁 ${esc(f.name)} <span class="text-xs font-normal text-slate-400">(${cnt})</span></button>`;
        }).join('')}
      </div>
      <button id="pk-cancel" class="btn3d mt-4 w-full bg-slate-100 py-3 text-sm font-bold text-slate-500" style="--btn-edge:#e2e8f0">취소</button>
    </div>`;
    document.body.appendChild(ov);
    const done=(v)=>{ ov.remove(); resolve(v); };
    ov.querySelectorAll('[data-pick]').forEach(b=> b.onclick=()=> done(b.dataset.pick || null));
    ov.querySelector('#pk-cancel').onclick=()=>done(undefined);

function pickFoldersModal(folders, title='폴더 선택 (여러 개 가능)', words=DB.words()){
  return new Promise(resolve=>{
    const tree = folderTreeFlat(folders);

    let sel = new Set();
    let anchor = null;
    const ov=document.createElement('div');
    ov.className='fixed inset-0 z-[70] flex items-end justify-center bg-slate-900/40 p-4 sm:items-center anim-in';
    document.body.appendChild(ov);
    const done=(v)=>{ ov.remove(); resolve(v); };
    function render(){
      ov.innerHTML=`<div class="max-h-[75vh] w-full max-w-xs overflow-y-auto rounded-3xl bg-white p-5 shadow-card">
        <p class="mb-1 text-center text-sm font-black text-slate-700">${esc(title)}</p>
        <p class="mb-3 text-center text-[11px] text-slate-400"><b>Ctrl+클릭</b> 개별선택 · <b>Shift+클릭</b> 연속선택</p>
        <div class="flex flex-col gap-1.5">
          <button data-pick-all class="rounded-xl px-3 py-2.5 text-left text-sm font-bold transition ${sel.size===0?'bg-brand-50 text-brand-700':'text-slate-600 hover:bg-slate-50'}">📚 전체 단어장 <span class="text-xs font-normal text-slate-400">(${rootCnt})</span></button>
          ${tree.map(f=>{
            const cnt = wordsInFolder(words, folders, f.id, true).length;
            const isSel = sel.has(f.id);
            return `<button data-pick="${f.id}" style="padding-left:${12+f.depth*16}px" class="rounded-xl px-3 py-2.5 text-left text-sm font-bold transition ${isSel?'bg-brand-100 text-brand-700 ring-1 ring-brand-400':'text-slate-600 hover:bg-slate-50'}">📁 ${esc(f.name)} <span class="text-xs font-normal text-slate-400">(${cnt})</span></button>`;
          }).join('')}
        </div>
        <div class="mt-4 grid grid-cols-2 gap-2">
          <button id="pkm-cancel" class="btn3d bg-slate-100 py-3 text-sm font-bold text-slate-500" style="--btn-edge:#e2e8f0">취소</button>
          <button id="pkm-ok" class="btn3d bg-brand-500 py-3 text-sm font-bold text-white" style="--btn-edge:#4338ca">선택 완료${sel.size?` (${sel.size})`:''}</button>
        </div>
      </div>`;
      ov.querySelector('[data-pick-all]').onclick=()=>{ sel=new Set(); anchor=null; render(); };
      ov.querySelectorAll('[data-pick]').forEach(b=>{
        b.onclick=(e)=>{
          const id=b.dataset.pick;
          if(e.shiftKey && anchor!==null){
            const ai=ids.indexOf(anchor), bi=ids.indexOf(id);
            if(ai!==-1 && bi!==-1){ const [a,c]=[ai,bi].sort((x,y)=>x-y); for(let k=a;k<=c;k++) sel.add(ids[k]); }
          } else if(e.ctrlKey || e.metaKey){
            if(sel.has(id)) sel.delete(id); else sel.add(id);
            anchor=id;
          } else {
            sel = new Set([id]); anchor=id;
          }
          render();
        };
      });
      ov.querySelector('#pkm-cancel').onclick=()=>done(undefined);
      ov.querySelector('#pkm-ok').onclick=()=>done(sel.size? [...sel] : null);
    }
    render();
    ov.addEventListener('click', e=>{ if(e.target===ov) done(undefined); });
  });
}

function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  const color = type==='ok' ? 'bg-slate-900' : type==='bad' ? 'bg-coral-600' : 'bg-brand-600';
  t.innerHTML = `<div class="${color} rounded-2xl px-5 py-3 text-sm font-bold text-white shadow-card">${esc(msg)}</div>`;
  t.style.opacity='1'; t.style.transform='translate(-50%, 0)';
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translate(-50%, 10px)'; }, 1900);
}

async function copyText(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    let ok=false; try{ ok=document.execCommand('copy'); }catch(_){}
    document.body.removeChild(ta); return ok;
  }
}

let _ac=null;
function beep(good){
  try{
    _ac = _ac || new (window.AudioContext||window.webkitAudioContext)();
    const o=_ac.createOscillator(), g=_ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.type='sine';
    const now=_ac.currentTime;
    if(good){ o.frequency.setValueAtTime(660,now); o.frequency.setValueAtTime(880,now+0.09); }
    else    { o.frequency.setValueAtTime(300,now); o.frequency.setValueAtTime(200,now+0.12); }
    g.gain.setValueAtTime(0.0001,now); g.gain.exponentialRampToValueAtTime(0.14,now+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,now+0.28);
    o.start(now); o.stop(now+0.3);
  }catch(e){}
}

// 컨페티
function confetti(){
  const cv=document.getElementById('fx'); cv.classList.remove('hidden');
  const ctx=cv.getContext('2d'); cv.width=innerWidth; cv.height=innerHeight;
  const colors=['#6366f1','#22c55e','#fb7185','#f59e0b','#38bdf8','#a78bfa'];
  const P=Array.from({length:150},()=>({
    x:innerWidth/2+(Math.random()-0.5)*120, y:innerHeight*0.35,
    vx:(Math.random()-0.5)*11, vy:Math.random()*-13-4,
    s:6+Math.random()*7, c:colors[Math.floor(Math.random()*colors.length)],
    r:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.35
  }));
  let f=0;
  (function loop(){
    f++; ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{ p.vy+=0.32; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.c;
      ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
    });
    if(f<130) requestAnimationFrame(loop); else cv.classList.add('hidden');
  })();
}

// "apple 사과", "apple, 사과", "apple 사과 run 달리다" 등을 영어/한글 자동 구분해 (en,ko)로 매칭
function parsePairs(raw){
  const isKo = c => /[\uAC00-\uD7A3\u3131-\u318E]/.test(c);
  const isEn = c => /[A-Za-z0-9]/.test(c);
  const rawTokens = raw.split(/[,;\n\r\t]+/).map(s=>s.trim()).filter(Boolean);
  const frags=[];
  rawTokens.forEach((tok, tokIdx)=>{
    let en='',ko='',phase='en',other='';
    const push=()=>{ en=en.trim(); ko=ko.trim(); if(en||ko) frags.push({en,ko,tok:tokIdx}); en='';ko='';phase='en'; other=''; };
    for(const ch of tok){
      if(isKo(ch)){
        ko += other; other='';           // 한글 앞에 있던 특수문자는 뜻 쪽으로
        phase='ko'; ko+=ch;
      } else if(isEn(ch)){
        if(phase==='ko'){ ko+=other; other=''; push(); } // 전환 직전 특수문자는 직전 뜻에 붙여 보존 후 전환
        en += other; other='';           // 영단어 앞에 있던 특수문자는 영단어 쪽으로
        phase='en'; en+=ch;
      } else {
        other += ch;                      // 다음 실제 글자가 나올 때까지 보류(어느 쪽 소속인지 그때 결정) — 유실 방지
      }
    }
    if(other){ if(phase==='ko') ko+=other; else en+=other; } // 토큰 끝에 남은 특수문자는 마지막 활성 쪽에
    push();
  });
  const pairs=[];
  for(let i=0;i<frags.length;i++){
    const f=frags[i], nx=frags[i+1];
    if(f.en && f.ko){ pairs.push({en:f.en, ko:f.ko}); }
    else if(f.en && !f.ko){
      if(nx && !nx.en && nx.ko){ pairs.push({en:f.en,ko:nx.ko}); i++; }
      else pairs.push({en:f.en,ko:''});
    } else if(!f.en && f.ko){
      // "뜻 en" 뒤집힌 순서는 콤마로 안 나뉜 같은 토큰일 때만 인정 (다른 토큰이면 새 단어의 시작일 뿐)
      if(nx && nx.en && !nx.ko && nx.tok===f.tok){ pairs.push({en:nx.en,ko:f.ko}); i++; }
      else {
        // 앞선 en에 딸린 추가 뜻(콤마로 나열된 두 번째 이후 의미) — 버리지 않고 이어붙임
        const p=pairs[pairs.length-1];
        if(p && p.en) p.ko = p.ko ? `${p.ko}, ${f.ko}` : f.ko;
      }
    }
  }
  return pairs;
}

        <input id="w-entry" placeholder="예: apple 사과   또는   apple, 사과" class="w-full rounded-xl border-2 border-slate-100 bg-slate-50 px-4 py-3 font-semibold outline-none focus:border-brand-400" />
        <button id="w-add" class="btn3d bg-brand-500 py-3.5 text-white" style="--btn-edge:#4338ca">＋ 단어 추가</button>
      </div>
      <details class="mt-3">
        <summary class="cursor-pointer text-xs font-bold text-brand-600">여러 개 한 번에 붙여넣기</summary>
        <p class="mt-2 text-xs text-slate-400">줄바꿈·콤마·띄어쓰기로 여러 개를 한꺼번에. (예: <b>apple 사과, run 달리다</b>)</p>
        <textarea id="w-bulk" rows="4" placeholder="apple 사과&#10;run 달리다&#10;happy 행복한&#10;&#10;또는: apple 사과, run 달리다, book 책" class="mt-2 w-full rounded-xl border-2 border-slate-100 bg-slate-50 px-3 py-2 text-sm outline-none focus:border-brand-400"></textarea>
        <button id="w-bulk-add" class="btn3d mt-2 w-full bg-slate-800 py-2.5 text-sm text-white" style="--btn-edge:#0f172a">일괄 추가</button>
      </details>
    </section>

    <section class="mt-4">
      <div class="mb-1 flex items-center justify-between px-1">
        <h2 class="text-sm font-extrabold text-slate-600">${curFolder?'이 폴더의 단어':'내 단어장'} <span class="text-brand-500">${words.length}</span>개</h2>
        ${words.length? `<button id="w-clear" class="text-xs font-bold text-coral-500">전체 삭제</button>`:''}
      </div>
      ${words.length? `<p class="mb-2 px-1 text-[11px] text-slate-400">번호를 탭하면 선택 · <b>Ctrl+클릭</b> 개별선택 · <b>Shift+클릭</b> 연속선택</p>`:''}
      ${emptyCount? `<div class="mb-2 rounded-xl bg-coral-50 px-3 py-2 text-[11px] font-semibold text-coral-600">⚠️ 뜻이 비어있는 단어 ${emptyCount}개 — 탭해서 채워주세요 (테스트에서 제외됩니다)</div>`:''}

      ${selWords.size? `
      <div class="sticky top-2 z-20 mb-2 flex items-center gap-1.5 rounded-2xl bg-brand-500 p-2 pl-4 text-white shadow-soft anim-slide">
        <span class="flex-1 text-sm font-black">${selWords.size}개 선택</span>
        <button id="sel-all" class="rounded-lg bg-white/20 px-2.5 py-1.5 text-xs font-bold">전체</button>
        <button id="sel-none" class="rounded-lg bg-white/20 px-2.5 py-1.5 text-xs font-bold">해제</button>
        <button id="sel-move" class="rounded-lg bg-white/20 px-2.5 py-1.5 text-xs font-bold">📁 이동</button>
        <button id="sel-del" class="rounded-lg bg-white px-3 py-1.5 text-xs font-black text-coral-600">🗑 삭제</button>
      </div>`:''}

      <div class="flex flex-col gap-2">
        ${words.length? words.map((w,i)=>{
          const empty = !w.ko || !w.ko.trim();
          const sel = selWords.has(w.id);
          return `
          <div data-row="${w.id}" class="anim-pop flex select-none items-center gap-3 rounded-2xl p-3 pr-2 shadow-sm transition ${sel?'bg-brand-50 ring-2 ring-brand-400':empty?'bg-white ring-1 ring-coral-200':'bg-white'}">
            <button data-sel="${w.id}" title="선택" class="grid h-9 w-9 shrink-0 place-items-center rounded-xl text-sm font-black transition ${sel?'bg-brand-500 text-white':'bg-brand-50 text-brand-500'}">${sel?'✓':(i+1)}</button>
            <div class="min-w-0 flex-1">
              <div class="truncate font-extrabold">${esc(w.en)}</div>
              <div data-editko="${w.id}" class="cursor-text truncate text-sm ${empty?'font-bold text-coral-400':'text-slate-400'}">${empty?'뜻 없음 · 탭하여 입력':esc(w.ko)}<span class="ml-1 text-slate-300">✎</span></div>
            </div>
            <button data-del="${w.id}" class="grid h-9 w-9 place-items-center rounded-xl text-slate-300 hover:bg-coral-50 hover:text-coral-500">✕</button>
          </div>`;}).join('')
        : `<div class="rounded-2xl border-2 border-dashed border-slate-200 py-10 text-center text-sm text-slate-400">${curFolder?'이 폴더에 단어가 없어요.':'아직 단어가 없어요.'}<br/>위에서 첫 단어를 추가해 보세요! ✏️</div>`}
      </div>
    </section>
  `;

  const entryEl=$('#w-entry'), addBtn=$('#w-add');

  // 파싱 → 뜻 없는 항목만 자동 번역 → 저장 (현재 폴더에 추가)
  async function addEntries(raw, btn){
    const pairs = parsePairs(raw);
    if(!pairs.length){ toast('인식된 단어가 없어요','bad'); return; }
    const needTx = pairs.filter(p=>!p.ko).length;
    btn.disabled=true;
    const list=DB.words(); let txDone=0, failed=0;
    for(const p of pairs){
      let ko=p.ko;
      if(!ko){ txDone++; btn.textContent=`🔎 뜻 자동 채우는 중… (${txDone}/${needTx})`; ko = await translateWord(p.en) || ''; if(!ko) failed++; }
      list.push({id:uid(8), en:p.en, ko, folderId:curFolder});
    }
    selWords.clear(); selAnchor=null;
    DB.saveWords(list); renderWords(root);
    if(failed) toast(`${pairs.length}개 추가 · ${failed}개는 뜻 확인 필요`,'bad');
    else toast(`${pairs.length}개 추가했어요 ✅`);
  }

  addBtn.onclick=async()=>{ if(entryEl.value.trim()){ await addEntries(entryEl.value, addBtn); const e=$('#w-entry'); if(e) e.focus(); } };
  entryEl.addEventListener('keydown',e=>{ if(e.key==='Enter') addBtn.click(); });
  // 한 줄짜리 입력칸에 여러 줄을 붙여넣으면 브라우저가 줄바꿈을 지워버려 단어 경계가 사라짐
  // → 붙여넣기 원문(줄바꿈 보존)을 직접 잡아 처리하고, 입력칸에는 아예 넣지 않음
  entryEl.addEventListener('paste', e=>{
    const text = (e.clipboardData || window.clipboardData)?.getData('text') || '';
    if(/[\n\r]/.test(text)){
      e.preventDefault();
      addEntries(text, addBtn);
    }
  });
  $('#w-bulk-add').onclick=async()=>{ const raw=$('#w-bulk').value.trim(); if(raw) await addEntries(raw, $('#w-bulk-add')); };

  // ----- 백업(내보내기) / 복원(가져오기) — 브라우저 데이터가 지워져도 대비할 수 있도록 -----
  $('#w-export').onclick=()=>{
    const data = { v:1, exportedAt:Date.now(), words:DB.words(), folders:DB.folders() };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const d = new Date();
    const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const a = document.createElement('a');
    a.href=url; a.download=`vocatest-backup-${stamp}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('백업 파일을 저장했어요 💾');
  };
  const importFile=$('#w-import-file');
  $('#w-import').onclick=()=> importFile.click();
  importFile.addEventListener('change', ()=>{
    const file = importFile.files[0]; importFile.value='';
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{
      let data; try{ data = JSON.parse(reader.result); }catch(e){ toast('올바른 백업 파일이 아니에요','bad'); return; }
      if(!data || !Array.isArray(data.words)){ toast('올바른 백업 파일이 아니에요','bad'); return; }
      const wCount=data.words.length, fCount=Array.isArray(data.folders)?data.folders.length:0;
      if(!(await askConfirm(`단어 ${wCount}개${fCount?`, 폴더 ${fCount}개`:''}를 지금 단어장에 합칠까요?`,'가져오기'))) return;
      // 폴더 id 충돌 방지를 위해 전부 새 id로 재매핑
      const idMap={};
      const newFolders=(data.folders||[]).map(f=>{ const nid=uid(8); idMap[f.id]=nid; return {...f, id:nid}; });
      newFolders.forEach(f=>{ f.parentId = f.parentId && idMap[f.parentId] ? idMap[f.parentId] : null; });
      const newWords=data.words.map(w=>({ id:uid(8), en:w.en||'', ko:w.ko||'', folderId: w.folderId && idMap[w.folderId] ? idMap[w.folderId] : null }));
      DB.saveFolders(DB.folders().concat(newFolders));
      DB.saveWords(DB.words().concat(newWords));
      toast(`${newWords.length}개 단어를 가져왔어요 ✅`); renderWords(root);
    };
    reader.readAsText(file);
  });

  // ----- 폴더 트리: 이동(breadcrumb) / 생성 -----
  const clearDropRing=(el)=> el.classList.remove('ring-2','ring-brand-400');
  root.querySelectorAll('[data-crumb]').forEach(b=> b.onclick=()=>{
    curFolder = b.dataset.crumb || null; selWords.clear(); selAnchor=null;
    treeSel.clear(); treeAnchor=null; renderWords(root);
  });
  // 최상위("전체")도 드래그 드롭 대상 — 폴더를 최상위로 옮기기
  const rootCrumb = root.querySelector('[data-crumb=""]');
  rootCrumb.addEventListener('dragover', e=>{ e.preventDefault(); rootCrumb.classList.add('ring-2','ring-brand-400'); });
  rootCrumb.addEventListener('dragleave', ()=> clearDropRing(rootCrumb));
  rootCrumb.addEventListener('drop', e=>{
    e.preventDefault(); clearDropRing(rootCrumb);
    let ids=[]; try{ ids = JSON.parse(e.dataTransfer.getData('text/plain')||'[]'); }catch(_){}
    if(!ids.length) return;
    const { moved, blocked } = reparentFolders(ids, null);
    if(moved) toast(`${moved}개 폴더를 최상위로 이동했어요 📁`);
    if(blocked) toast(`${blocked}개는 옮길 수 없어요`,'bad');
    if(moved) renderWords(root);
  });

  $('#f-new').onclick=async()=>{
    const name = await askPrompt('새 폴더 이름을 입력하세요','예: 1과 · Chapter 1');
    if(!name) return;
    const list=DB.folders(); list.push({id:uid(8), name, parentId:curFolder}); DB.saveFolders(list);
    toast('폴더를 만들었어요 📁'); renderWords(root);
  };

  // ----- 폴더 트리 행: 클릭 선택/이동, 펼치기, 드래그&드롭 -----
  root.querySelectorAll('[data-tree-row]').forEach(row=>{
    const id = row.dataset.treeRow;
    row.addEventListener('click', e=>{
      if(e.target.closest('[data-tree-toggle],[data-folder-rename],[data-folder-del],[data-folder-outdent],[data-folder-indent]')) return;
      const visIds = treeRows.map(f=>f.id);
      if(e.shiftKey && treeAnchor!==null){
        const ai=visIds.indexOf(treeAnchor), bi=visIds.indexOf(id);
        if(ai!==-1 && bi!==-1){ const [a,b]=[ai,bi].sort((x,y)=>x-y); treeSel.clear(); for(let k=a;k<=b;k++) treeSel.add(visIds[k]); }
        e.preventDefault(); renderWords(root); return;
      }
      if(e.ctrlKey || e.metaKey){
        if(treeSel.has(id)) treeSel.delete(id); else treeSel.add(id);
        treeAnchor=id; e.preventDefault(); renderWords(root); return;
      }
      // 일반 클릭: 그 폴더로 이동 + 단일 선택
      curFolder=id; treeSel.clear(); treeSel.add(id); treeAnchor=id;
      selWords.clear(); selAnchor=null; renderWords(root);
    });
    const toggle = row.querySelector('[data-tree-toggle]');
    if(toggle) toggle.addEventListener('click', e=>{
      e.stopPropagation();
      if(treeExpanded.has(id)) treeExpanded.delete(id); else treeExpanded.add(id);
      renderWords(root);
    });
    row.addEventListener('dragstart', e=>{
      const dragIds = treeSel.has(id) ? [...treeSel] : [id];
      e.dataTransfer.setData('text/plain', JSON.stringify(dragIds));
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; row.classList.add('ring-2','ring-brand-400'); });
    row.addEventListener('dragleave', ()=> clearDropRing(row));
    row.addEventListener('drop', e=>{
      e.preventDefault(); clearDropRing(row);
      let ids=[]; try{ ids = JSON.parse(e.dataTransfer.getData('text/plain')||'[]'); }catch(_){}
      if(!ids.length) return;
      const { moved, blocked } = reparentFolders(ids, id);
      if(moved) toast(`${moved}개 폴더 이동했어요 📁`);
      if(blocked) toast(`${blocked}개는 하위 폴더로 옮길 수 없어요`,'bad');
      if(moved) renderWords(root);
    });
  });

  root.querySelectorAll('[data-folder-outdent]').forEach(b=> b.onclick=(e)=>{
    e.stopPropagation();
    if(b.disabled) return;
    const id=b.dataset.folderOutdent;
    const list=DB.folders(); const f=list.find(x=>x.id===id);
    if(!f || f.parentId==null) return;
    const parent=list.find(x=>x.id===f.parentId);
    f.parentId = parent ? (parent.parentId||null) : null;
    DB.saveFolders(list); renderWords(root);
  });
  root.querySelectorAll('[data-folder-indent]').forEach(b=> b.onclick=(e)=>{
    e.stopPropagation();
    if(b.disabled) return;
    const id=b.dataset.folderIndent;
    const list=DB.folders(); const f=list.find(x=>x.id===id);
    if(!f) return;
    const siblings=folderChildren(list, f.parentId);
    const idx=siblings.findIndex(s=>s.id===f.id);
    if(idx<=0) return;
    f.parentId = siblings[idx-1].id;
    treeExpanded.add(siblings[idx-1].id); // 새 부모를 펼쳐서 옮긴 폴더가 바로 보이게
    DB.saveFolders(list); renderWords(root);
  });
  root.querySelectorAll('[data-folder-rename]').forEach(b=> b.onclick=async(e)=>{
    e.stopPropagation();
    const fid=b.dataset.folderRename; const f=folders.find(x=>x.id===fid);
    const name=await askPrompt('폴더 이름을 바꿔주세요','',"저장",f.name);
    if(!name) return;
    const list=DB.folders(); const idx=list.findIndex(x=>x.id===fid);
    if(idx>-1){ list[idx].name=name; DB.saveFolders(list); renderWords(root); }
  });
  root.querySelectorAll('[data-folder-del]').forEach(b=> b.onclick=async(e)=>{
    e.stopPropagation();
    const fid=b.dataset.folderDel; const f=folders.find(x=>x.id===fid);
    const delIds = folderDescendantIds(folders, fid);
    const cnt = allWords.filter(w=>delIds.includes(w.folderId||null)).length;
    const subCnt = delIds.length-1;
    const extra = (cnt||subCnt)? `\n안의 단어 ${cnt}개${subCnt?`, 하위폴더 ${subCnt}개`:''}도 함께 삭제돼요.`:'';
    if(await askConfirm(`'${f.name}' 폴더를 삭제할까요?${extra}`)){
      DB.saveFolders(DB.folders().filter(x=>!delIds.includes(x.id)));
      DB.saveWords(DB.words().filter(w=>!delIds.includes(w.folderId||null)));
      toast('폴더를 삭제했어요'); renderWords(root);
    }
  });

  // ----- 폴더 트리 선택 툴바: 잘라내기/복사/삭제/해제, 클립보드 붙여넣기 -----
  const treeCut=$('#tree-cut'); if(treeCut) treeCut.onclick=()=>{
    folderClipboard={ids:[...treeSel], mode:'cut'}; toast(`${treeSel.size}개 폴더 잘라내기`); renderWords(root);
  };
  const treeCopy=$('#tree-copy'); if(treeCopy) treeCopy.onclick=()=>{
    folderClipboard={ids:[...treeSel], mode:'copy'}; toast(`${treeSel.size}개 폴더 복사`); renderWords(root);
  };
  const treeNone=$('#tree-none'); if(treeNone) treeNone.onclick=()=>{ treeSel.clear(); treeAnchor=null; renderWords(root); };
  const treeDel=$('#tree-del'); if(treeDel) treeDel.onclick=async()=>{
    const ids=[...treeSel];
    const delIds=new Set(); ids.forEach(id=> folderDescendantIds(folders,id).forEach(x=>delIds.add(x)));
    const wc = allWords.filter(w=>delIds.has(w.folderId||null)).length;
    if(await askConfirm(`선택한 폴더 ${ids.length}개를 삭제할까요?\n안의 단어 ${wc}개도 함께 삭제돼요.`)){
      DB.saveFolders(DB.folders().filter(f=>!delIds.has(f.id)));
      DB.saveWords(DB.words().filter(w=>!delIds.has(w.folderId||null)));
      treeSel.clear(); toast('삭제했어요'); renderWords(root);
    }
  };
  const treePaste=$('#tree-paste'); if(treePaste) treePaste.onclick=()=>{
    const res = pasteFolderClipboard(folderClipboard, curFolder);
    folderClipboard=null;
    if(res){
      if(res.mode==='cut'){ if(res.moved) toast(`${res.moved}개 폴더 이동했어요 📁`); if(res.blocked) toast(`${res.blocked}개는 하위 폴더로 옮길 수 없어요`,'bad'); }
      else toast(`${res.count}개 폴더 복사했어요 📋`);
    }
    renderWords(root);
  };
  const treePasteCancel=$('#tree-paste-cancel'); if(treePasteCancel) treePasteCancel.onclick=()=>{ folderClipboard=null; renderWords(root); };

  // ----- 다중 선택 (Ctrl 개별 / Shift 연속 / 번호탭) -----
  const toggle=(id)=>{ if(selWords.has(id)) selWords.delete(id); else selWords.add(id); selAnchor=id; };
  root.querySelectorAll('[data-row]').forEach(row=> row.addEventListener('click', e=>{
    const id=row.dataset.row;
    if(e.target.closest('[data-del]')) return;                 // 개별 삭제 버튼은 별도 처리
    if(e.shiftKey && selAnchor!==null){                        // 연속 선택
      const ids = words.map(w=>w.id);
      const ai=ids.indexOf(selAnchor), bi=ids.indexOf(id);
      if(ai!==-1 && bi!==-1){ const [a,b]=[ai,bi].sort((x,y)=>x-y); for(let k=a;k<=b;k++) selWords.add(ids[k]); }
      e.preventDefault(); renderWords(root); return;
    }
    if(e.ctrlKey || e.metaKey || e.target.closest('[data-sel]')){  // 개별 선택(Ctrl) 또는 번호 탭
      toggle(id); e.preventDefault(); renderWords(root); return;
    }
    // 그 외 일반 클릭은 뜻 수정 등 기존 동작에 맡김
  }));

  // 선택 툴바
  const selAll=$('#sel-all'); if(selAll) selAll.onclick=()=>{ words.forEach(w=>selWords.add(w.id)); renderWords(root); };
  const selNone=$('#sel-none'); if(selNone) selNone.onclick=()=>{ selWords.clear(); selAnchor=null; renderWords(root); };
  const selMove=$('#sel-move'); if(selMove) selMove.onclick=async()=>{
    const target = await pickFolderModal(DB.folders(), `${selWords.size}개 단어를 이동할 폴더 선택`);
    if(target===undefined) return;
    const list=DB.words(); list.forEach(w=>{ if(selWords.has(w.id)) w.folderId=target; });
    const n=selWords.size; selWords.clear(); selAnchor=null; DB.saveWords(list); renderWords(root); toast(`${n}개 이동했어요 📁`);
  };
  const selDel=$('#sel-del'); if(selDel) selDel.onclick=async()=>{
    const n=selWords.size;
    if(await askConfirm(`선택한 ${n}개 단어를 삭제할까요?`)){
      const list=DB.words().filter(w=>!selWords.has(w.id));
      selWords.clear(); selAnchor=null; DB.saveWords(list); renderWords(root); toast(`${n}개 삭제했어요`);
    }
  };

  // 뜻 인라인 수정 (수식어 키 없을 때만)
  root.querySelectorAll('[data-editko]').forEach(el=> el.onclick=(e)=>{
    if(e.ctrlKey||e.metaKey||e.shiftKey) return;
    const id=el.dataset.editko; const list=DB.words(); const w=list.find(x=>x.id===id);
    const cur = document.createElement('input');
    cur.value = w.ko||''; cur.placeholder='뜻 입력';
    cur.className='w-full rounded-lg border-2 border-brand-400 bg-white px-2 py-1 text-sm font-bold outline-none';
    el.replaceWith(cur); cur.focus();
    const save=()=>{ const l=DB.words(); const t=l.find(x=>x.id===id); if(t) t.ko=cur.value.trim(); DB.saveWords(l); renderWords(root); };
    cur.addEventListener('keydown',ev=>{ if(ev.key==='Enter') save(); });
    cur.addEventListener('blur', save);
  });

  // 개별 삭제
  root.querySelectorAll('[data-del]').forEach(b=> b.onclick=(e)=>{
    e.stopPropagation();
    const id=b.dataset.del; const list=DB.words().filter(w=>w.id!==id);
    selWords.clear(); selAnchor=null; DB.saveWords(list); renderWords(root);
  });

  // 전체 삭제 (앱 내부 확인창) — 현재 폴더에 보이는 단어만 삭제
  const clr=$('#w-clear'); if(clr) clr.onclick=async()=>{
    if(await askConfirm(`${curFolder?'이 폴더의':'전체'} 단어 ${words.length}개를 모두 삭제할까요?`)){
      const ids=new Set(words.map(w=>w.id));
      DB.saveWords(DB.words().filter(w=>!ids.has(w.id)));
      selWords.clear(); selAnchor=null; renderWords(root); toast('삭제했어요');
    }
  };
}

/* ---------- 탭: 테스트 만들기 ---------- */
let makeCfg = { mode:'mixed', studySec:4, expDays:7, folderIds:null, sampleMode:'all', sampleCount:'', samplePercent:'' };
const EXP_OPTIONS = [ {d:1,t:'1일'}, {d:3,t:'3일'}, {d:7,t:'7일'}, {d:30,t:'30일'}, {d:0,t:'무제한'} ];

function renderMake(root){
  const folders = DB.folders();
  if(makeCfg.folderIds){
    makeCfg.folderIds = makeCfg.folderIds.filter(id=> folders.find(f=>f.id===id)); // 삭제된 폴더 정리
    if(!makeCfg.folderIds.length) makeCfg.folderIds = null;
  }
  const scoped = wordsInFolders(DB.words(), folders, makeCfg.folderIds, true);
  const validWords = scoped.filter(w=>w.ko && w.ko.trim());
  const excluded = scoped.length - validWords.length;
  const folderLabel = (()=>{
    if(!makeCfg.folderIds || !makeCfg.folderIds.length) return '전체 단어장';
    const names = makeCfg.folderIds.map(id=> folders.find(f=>f.id===id)?.name).filter(Boolean);
    if(!names.length) return '전체 단어장';
    return names.length<=2 ? names.join(', ') : `${names.slice(0,2).join(', ')} 외 ${names.length-2}개`;
  })();

  // 출제 개수 미리보기 (전체 / 개수 지정 / 퍼센트 지정)
  function computeSampleN(total){
    if(makeCfg.sampleMode==='count'){
      const n=parseInt(makeCfg.sampleCount,10);
      if(!n || n<1) return null;
      return Math.min(n, total);
    }
    if(makeCfg.sampleMode==='percent'){
      const p=parseInt(makeCfg.samplePercent,10);
      if(!p || p<1) return null;
      return Math.max(1, Math.min(total, Math.round(total*Math.min(p,100)/100)));
    }
    return total;
  }
  const effectiveN = computeSampleN(validWords.length);
  const previewCount = effectiveN ?? validWords.length;
  const enough = previewCount>=4;

  root.innerHTML = `
    <section class="anim-slide rounded-3xl bg-white p-5 shadow-card">
      <h2 class="mb-1 text-base font-extrabold">테스트 만들기</h2>
      <p class="mb-4 text-xs text-slate-400">사용할 단어 <b class="text-brand-500">${previewCount}</b>개로 링크를 만듭니다.${excluded?` <span class="text-coral-500">(뜻 없는 ${excluded}개 제외)</span>`:''}${makeCfg.sampleMode!=='all'?` <span class="text-slate-400">(전체 ${validWords.length}개 중 무작위 추출)</span>`:''}</p>

      <label class="mb-1.5 block text-xs font-bold text-slate-500">📁 출제 범위</label>
      <button id="t-folder" class="mb-4 flex w-full items-center justify-between rounded-xl border-2 border-slate-100 bg-slate-50 px-4 py-3 text-left font-bold outline-none focus:border-brand-400">
        <span class="truncate">${esc(folderLabel)}</span><span class="shrink-0 text-xs text-slate-400">변경 ›</span>
      </button>

      <label class="mb-1.5 block text-xs font-bold text-slate-500">🔢 출제 개수</label>
      <div class="mb-2 grid grid-cols-3 gap-2" id="t-samplemode">
        ${sampleModeCard('all','전체', `${validWords.length}개`)}
        ${sampleModeCard('count','개수 지정','직접 입력')}
        ${sampleModeCard('percent','퍼센트','직접 입력')}
      </div>
      ${makeCfg.sampleMode==='count'? `
      <input id="t-samplecount" type="number" min="1" max="${validWords.length}" value="${esc(makeCfg.sampleCount)}" placeholder="예: 15" class="mb-4 w-full rounded-xl border-2 border-slate-100 bg-slate-50 px-4 py-3 font-semibold outline-none focus:border-brand-400" />`:''}
      ${makeCfg.sampleMode==='percent'? `
      <div class="mb-4 flex items-center gap-2">
        <input id="t-samplepercent" type="number" min="1" max="100" value="${esc(makeCfg.samplePercent)}" placeholder="예: 50" class="w-full rounded-xl border-2 border-slate-100 bg-slate-50 px-4 py-3 font-semibold outline-none focus:border-brand-400" />
        <span class="shrink-0 font-bold text-slate-400">%</span>
      </div>`:''}

      <label class="mb-1 block text-xs font-bold text-slate-500">학생 이름표 (선택)</label>
      <input id="t-name" placeholder="예: 3월 데일리 테스트" class="mb-4 w-full rounded-xl border-2 border-slate-100 bg-slate-50 px-4 py-3 font-semibold outline-none focus:border-brand-400" />

      <label class="mb-1.5 block text-xs font-bold text-slate-500">문제 유형</label>
      <div class="mb-4 grid grid-cols-3 gap-2" id="t-mode">
        ${modeCard('mc','객관식','4지선다')}
        ${modeCard('spelling','주관식','스펠링')}
        ${modeCard('mixed','혼합','랜덤')}
      </div>

      <label class="mb-1.5 block text-xs font-bold text-slate-500">🔒 링크 만료일 <span class="font-normal text-slate-400">(지나면 자동 차단)</span></label>
      <div class="mb-4 grid grid-cols-5 gap-1.5" id="t-exp">
        ${EXP_OPTIONS.map(o=>{
          const on=makeCfg.expDays===o.d;
          return `<button data-exp="${o.d}" class="rounded-xl border-2 py-2.5 text-xs font-extrabold transition ${on?'border-brand-500 bg-brand-50 text-brand-700':'border-slate-100 bg-white text-slate-400'}">${o.t}</button>`;
        }).join('')}
      </div>

      <label class="mb-1.5 block text-xs font-bold text-slate-500">틀렸을 때 공부 시간: <span id="t-secval" class="text-brand-600">${makeCfg.studySec}초</span></label>
      <input id="t-sec" type="range" min="2" max="10" value="${makeCfg.studySec}" class="mb-5 w-full accent-brand-500" />

      ${!enough && makeCfg.mode!=='spelling' ? `<div class="mb-3 rounded-xl bg-coral-50 px-4 py-3 text-xs font-semibold text-coral-600">객관식·혼합은 뜻이 있는 단어가 4개 이상 필요해요. (스펠링은 가능)</div>`:''}

      <button id="t-make" class="btn3d w-full bg-grass-500 py-4 text-white" style="--btn-edge:#15803d">🔗 테스트 링크 만들기</button>
    </section>

    <div id="t-result"></div>
  `;

  root.querySelectorAll('[data-mode]').forEach(c=> c.onclick=()=>{ makeCfg.mode=c.dataset.mode; renderMake(root); });
  root.querySelectorAll('[data-exp]').forEach(b=> b.onclick=()=>{ makeCfg.expDays=+b.dataset.exp; renderMake(root); });
  const sec=$('#t-sec'); sec.oninput=()=>{ makeCfg.studySec=+sec.value; $('#t-secval').textContent=sec.value+'초'; };
  $('#t-folder').onclick=async()=>{
    const pickedFolders = await pickFoldersModal(DB.folders(), '어느 폴더에서 출제할까요? (여러 개 선택 가능)');
    if(pickedFolders===undefined) return;
    makeCfg.folderIds = pickedFolders; renderMake(root);
  };
  root.querySelectorAll('[data-samplemode]').forEach(b=> b.onclick=()=>{ makeCfg.sampleMode=b.dataset.samplemode; renderMake(root); });
  const scEl=$('#t-samplecount'); if(scEl) scEl.addEventListener('change',()=>{ makeCfg.sampleCount=scEl.value; renderMake(root); });
  const spEl=$('#t-samplepercent'); if(spEl) spEl.addEventListener('change',()=>{ makeCfg.samplePercent=spEl.value; renderMake(root); });

  $('#t-make').onclick=()=>{
    const valid = wordsInFolders(DB.words(), DB.folders(), makeCfg.folderIds, true).filter(w=>w.ko && w.ko.trim());
    if(valid.length<1){ toast('뜻이 있는 단어를 먼저 추가하세요','bad'); return; }

    let sampleN = valid.length;
    if(makeCfg.sampleMode==='count'){
      const n=parseInt(makeCfg.sampleCount,10);
      if(!n || n<1){ toast('출제할 개수를 입력하세요','bad'); return; }
      sampleN = Math.min(n, valid.length);
    } else if(makeCfg.sampleMode==='percent'){
      const p=parseInt(makeCfg.samplePercent,10);
      if(!p || p<1){ toast('출제할 퍼센트를 입력하세요','bad'); return; }
      sampleN = Math.max(1, Math.round(valid.length*Math.min(p,100)/100));
    }
    const picked = shuffle(valid).slice(0, sampleN);
    if(makeCfg.mode!=='spelling' && picked.length<4){ toast('객관식은 뜻 있는 단어 4개 이상 필요해요','bad'); return; }

    const key = uid(12);
    const exp = makeCfg.expDays>0 ? Date.now() + makeCfg.expDays*86400000 : 0;
    const dc = deliveryCfg();
    const dm = dc.mode==='none' ? '' : dc.mode;                 // 'hook' 또는 ''
    const dv = dm==='hook' ? (dc.url||'') : '';
    const dt = dm==='hook' ? (dc.token||'') : '';
    if(dm==='hook' && !dv){ toast('결과 탭에서 구글시트 URL을 먼저 저장하세요','bad'); return; }
    // 결과 시트에 같이 남길 출제 정보(범위/개수) — 학생 쪽엔 폴더 구조가 없으므로 미리 문자열로 요약해 둠
    const countLabel = makeCfg.sampleMode==='all' ? `${picked.length}개(전체)`
                      : makeCfg.sampleMode==='count' ? `${picked.length}개(전체 ${valid.length}개 중 지정)`
                      : `${picked.length}개(전체 ${valid.length}개 중 ${makeCfg.samplePercent}%)`;
    const payload = { v:1, s:key, n:$('#t-name').value.trim(), mode:makeCfg.mode, sec:makeCfg.studySec,
                      exp, dm, dv, dt, rng:folderLabel, cnt:countLabel, w: picked.map(w=>({e:w.en,k:w.ko})) };
    const link = buildLink(payload);

    const sessions=DB.sessions();
    sessions.unshift({ key, name:payload.n, mode:makeCfg.mode, sec:makeCfg.studySec, count:picked.length,
                       created:Date.now(), exp, dm, dv, dt, rng:folderLabel, cnt:countLabel, status:'active',
                       snapshot: picked.map(w=>({e:w.en,k:w.ko})) });
    DB.saveSessions(sessions);

    const expText = exp ? `${new Date(exp).getFullYear()}. ${new Date(exp).getMonth()+1}. ${new Date(exp).getDate()}` : '무제한';
    const dText = dm==='hook' ? '📊 결과 → 구글시트 자동전송' : '📋 결과 수동 전송';
    $('#t-result').innerHTML = `
      <section class="anim-in mt-4 rounded-3xl bg-brand-50 p-5 shadow-card ring-1 ring-brand-100">
        <div class="mb-2 flex items-center gap-2 text-brand-700"><span class="text-lg">✅</span><b>링크가 만들어졌어요!</b></div>
        <div class="mb-2 flex flex-wrap gap-1.5">
          <span class="inline-flex items-center gap-1 rounded-full bg-white px-3 py-1 text-[11px] font-bold text-brand-600 shadow-sm">🔒 만료: ${expText}</span>
          <span class="inline-flex items-center gap-1 rounded-full bg-white px-3 py-1 text-[11px] font-bold text-grass-600 shadow-sm">${dText}</span>
        </div>
        <div class="mb-3 break-all rounded-xl bg-white px-4 py-3 text-xs text-slate-500 shadow-sm">${esc(link)}</div>
        <div class="grid grid-cols-2 gap-2">
          <button id="t-copy" class="btn3d bg-brand-500 py-3 text-sm text-white" style="--btn-edge:#4338ca">링크 복사</button>
          <a href="${esc(link)}" target="_blank" class="btn3d grid place-items-center bg-slate-800 py-3 text-sm text-white" style="--btn-edge:#0f172a">미리보기</a>
        </div>
        ${dm==='hook'? `
        <button id="t-shorten" class="btn3d mt-2 w-full bg-white py-2.5 text-sm text-brand-600" style="--btn-edge:#e2e8f0">🔗 짧은 링크 만들기</button>
        <div id="t-short-result"></div>`:''}
        <p class="mt-3 text-[11px] leading-relaxed text-slate-400">만료일이 지나면 어느 기기에서든 자동 차단돼요. <b>세션 관리</b> 탭에서 미리 만료시킬 수도 있어요.</p>
      </section>`;
    $('#t-copy').onclick=async()=>{ (await copyText(link))? toast('링크를 복사했어요 📋'):toast('복사 실패','bad'); };
    const shortenBtn=$('#t-shorten');
    if(shortenBtn) shortenBtn.onclick=async()=>{
      shortenBtn.disabled=true; shortenBtn.textContent='짧은 링크 만드는 중…';
      const signed = signPayload(payload);
      const storeUrl = dv + '?action=store&key=' + encodeURIComponent(key) + '&token=' + encodeURIComponent(dt) + '&payload=' + encodeURIComponent(JSON.stringify(signed));
      const res = await jsonpFetch(storeUrl);
      shortenBtn.disabled=false; shortenBtn.textContent='🔗 짧은 링크 만들기';
      if(res==='ok'){
        const shortLink = location.origin + location.pathname + '?session=' + key + '&r=1&rv=' + encodeURIComponent(dv) + '&rt=' + encodeURIComponent(dt);
        const list=DB.sessions(); const s=list.find(x=>x.key===key); if(s){ s.shortLink=shortLink; DB.saveSessions(list); }
        $('#t-short-result').innerHTML = `
          <div class="mt-2 flex items-center gap-2 rounded-xl bg-grass-50 px-4 py-3 ring-1 ring-grass-100">
            <span class="min-w-0 flex-1 truncate text-sm font-bold text-grass-700">${esc(shortLink)}</span>
            <button id="t-short-copy" class="btn3d shrink-0 bg-grass-500 px-3 py-2 text-xs text-white" style="--btn-edge:#15803d">복사</button>
          </div>`;
        $('#t-short-copy').onclick=async()=>{ (await copyText(shortLink))? toast('짧은 링크를 복사했어요 📋'):toast('복사 실패','bad'); };
        toast('짧은 링크를 만들었어요 🔗');
      } else {
        toast('짧은 링크 저장에 실패했어요 — 원래 링크를 사용해주세요','bad');
      }
    };
    $('#t-result').scrollIntoView({behavior:'smooth',block:'center'});
    toast('세션 발급 완료 🔑');
  };

  function modeCard(id,title,sub){
    const on=makeCfg.mode===id;
    return `<button data-mode="${id}" class="rounded-2xl border-2 py-3 text-center transition ${on?'border-brand-500 bg-brand-50 text-brand-700':'border-slate-100 bg-white text-slate-400'}">
      <div class="text-sm font-extrabold">${title}</div><div class="text-[11px]">${sub}</div></button>`;
  }
  function sampleModeCard(id,title,sub){
    const on=makeCfg.sampleMode===id;
    return `<button data-samplemode="${id}" class="rounded-2xl border-2 py-3 text-center transition ${on?'border-brand-500 bg-brand-50 text-brand-700':'border-slate-100 bg-white text-slate-400'}">
      <div class="text-sm font-extrabold">${title}</div><div class="text-[11px]">${sub}</div></button>`;
  }
}

/* ---------- 탭: 세션 관리 ---------- */
function renderSessions(root){
  const sessions = DB.sessions();
  root.innerHTML = `
    <section class="anim-slide">
      <div class="mb-3 rounded-2xl bg-amber-50 px-4 py-3 text-[11px] leading-relaxed text-amber-700 ring-1 ring-amber-100">
        💡 링크는 <b>만료일이 지나면 어느 기기에서든 자동 차단</b>돼요. <b>‘만료시키기’</b>를 누르면 이 브라우저에서 즉시 차단됩니다.
      </div>
      <div class="flex flex-col gap-2.5">
        ${sessions.length? sessions.map(s=>sessionCard(s)).join('')
        : `<div class="rounded-2xl border-2 border-dashed border-slate-200 py-10 text-center text-sm text-slate-400">아직 만든 테스트가 없어요.<br/>‘테스트 만들기’에서 링크를 발급해 보세요 🎯</div>`}
      </div>
      ${sessions.length? `<button id="s-clear" class="mt-4 w-full rounded-xl py-2 text-xs font-bold text-slate-300">만료된 세션 정리</button>`:''}
    </section>`;

  root.querySelectorAll('[data-copy]').forEach(b=> b.onclick=async()=>{
    const s=DB.sessions().find(x=>x.key===b.dataset.copy);
    const link = rebuildLink(s);
    (await copyText(link))? toast('링크 복사 📋'):toast('복사 실패','bad');
  });
  root.querySelectorAll('[data-expire]').forEach(b=> b.onclick=()=>{
    const list=DB.sessions(); const s=list.find(x=>x.key===b.dataset.expire);
    if(s){ s.status = s.status==='active'?'expired':'active'; DB.saveSessions(list); renderSessions(root);
      toast(s.status==='expired'?'세션을 만료했어요 🔒':'세션을 다시 활성화했어요 🔓'); }
  });
  root.querySelectorAll('[data-remove]').forEach(b=> b.onclick=()=>{
    let list=DB.sessions(); list=list.filter(x=>x.key!==b.dataset.remove); DB.saveSessions(list); renderSessions(root);
  });
  root.querySelectorAll('[data-copy-short]').forEach(b=> b.onclick=async()=>{
    const s=DB.sessions().find(x=>x.key===b.dataset.copyShort);
    if(s && s.shortLink){ (await copyText(s.shortLink))? toast('짧은 링크 복사 📋'):toast('복사 실패','bad'); }
  });
  root.querySelectorAll('[data-make-short]').forEach(b=> b.onclick=async()=>{
    const key=b.dataset.makeShort; const s=DB.sessions().find(x=>x.key===key); if(!s || !s.dv) return;
    b.disabled=true; b.textContent='만드는 중…';
    const signed = signPayload({ v:1, s:s.key, n:s.name, mode:s.mode, sec:s.sec, exp:s.exp||0, dm:s.dm||'', dv:s.dv||'', dt:s.dt||'', rng:s.rng||'', cnt:s.cnt||'', w: s.snapshot||[] });
    const storeUrl = s.dv + '?action=store&key=' + encodeURIComponent(key) + '&token=' + encodeURIComponent(s.dt||'') + '&payload=' + encodeURIComponent(JSON.stringify(signed));
    const res = await jsonpFetch(storeUrl);
    if(res==='ok'){
      const shortLink = location.origin + location.pathname + '?session=' + key + '&r=1&rv=' + encodeURIComponent(s.dv) + '&rt=' + encodeURIComponent(s.dt||'');
      const list=DB.sessions(); const t=list.find(x=>x.key===key); if(t){ t.shortLink=shortLink; DB.saveSessions(list); }
      toast('짧은 링크를 만들었어요 🔗'); renderSessions(root);
    } else {
      b.disabled=false; b.textContent='🔗 짧은 링크 만들기';
      toast('짧은 링크 저장에 실패했어요','bad');
    }
  });
  const clr=$('#s-clear'); if(clr) clr.onclick=()=>{ DB.saveSessions(DB.sessions().filter(s=>s.status==='active')); renderSessions(root); };

  function sessionCard(s){
    const manualExpired = s.status==='expired';
    const timeExpired = s.exp && Date.now() > s.exp;
    const on = !manualExpired && !timeExpired;
    const modeTxt = {mc:'객관식',spelling:'주관식',mixed:'혼합'}[s.mode]||s.mode;
    const d = new Date(s.created);
    const date = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

    let badge, expLine;
    if(manualExpired){ badge=`<span class="shrink-0 rounded-full bg-coral-50 px-2 py-0.5 text-[10px] font-black text-coral-500">만료됨</span>`; }
    else if(timeExpired){ badge=`<span class="shrink-0 rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-black text-slate-400">기간만료</span>`; }
    else { badge=`<span class="shrink-0 rounded-full bg-grass-50 px-2 py-0.5 text-[10px] font-black text-grass-600">활성</span>`; }

    if(!s.exp){ expLine='만료 무제한'; }
    else {
      const ed=new Date(s.exp);
      const dday = Math.ceil((s.exp - Date.now())/86400000);
      expLine = timeExpired ? `만료됨 (${ed.getMonth()+1}/${ed.getDate()})`
              : `~${ed.getMonth()+1}/${ed.getDate()} 까지 · D-${dday}`;
    }

    return `<div class="rounded-2xl bg-white p-4 shadow-sm ${on?'':'opacity-70'}">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0">
          <div class="flex items-center gap-2">
            <span class="truncate font-extrabold">${esc(s.name||'이름 없는 테스트')}</span>
            ${badge}
          </div>
          <div class="mt-0.5 text-xs text-slate-400">${modeTxt} · ${s.count}단어 · ${date}</div>
          <div class="mt-0.5 text-[11px] font-bold ${timeExpired?'text-slate-400':'text-brand-500'}">🔒 ${expLine}</div>
        </div>
      </div>
      <div class="mt-3 grid grid-cols-3 gap-1.5">
        <button data-copy="${s.key}" class="rounded-lg bg-slate-100 py-2 text-xs font-bold text-slate-600">링크</button>
        <button data-expire="${s.key}" class="rounded-lg py-2 text-xs font-bold ${s.status==='active'?'bg-coral-50 text-coral-600':'bg-grass-50 text-grass-600'}">${s.status==='active'?'지금 만료':'재활성화'}</button>
        <button data-remove="${s.key}" class="rounded-lg bg-slate-100 py-2 text-xs font-bold text-slate-400">삭제</button>
      </div>
      ${s.shortLink? `
      <div class="mt-2 flex items-center gap-1.5 rounded-lg bg-grass-50 px-2.5 py-2">
        <span class="min-w-0 flex-1 truncate text-[11px] font-bold text-grass-700">🔗 ${esc(s.shortLink)}</span>
        <button data-copy-short="${s.key}" class="shrink-0 rounded-md bg-grass-500 px-2 py-1 text-[10px] font-bold text-white">복사</button>
      </div>` : (s.dm==='hook' ? `
      <button data-make-short="${s.key}" class="mt-2 w-full rounded-lg py-1.5 text-[11px] font-bold text-brand-500">🔗 짧은 링크 만들기</button>` : '')}
    </div>`;
  }
}
// 세션 카드에서 링크 재생성 (생성 당시 단어 스냅샷 + 만료일 유지)
function rebuildLink(s){
  const snap = s.snapshot || DB.words().map(w=>({e:w.en,k:w.ko}));
  const payload = { v:1, s:s.key, n:s.name, mode:s.mode, sec:s.sec, exp:s.exp||0, dm:s.dm||'', dv:s.dv||'', dt:s.dt||'', rng:s.rng||'', cnt:s.cnt||'', w: snap };
  return buildLink(payload);
}

function renderResultsTab(root){

  const useHook = dc.mode==='hook';
  const guideCode =
`function doPost(e){                                // 학생이 결과를 보낼 때(POST)
  var d = JSON.parse(e.postData.contents);
  if(d.token !== '${dc.token}'){                    // 비밀 토큰 확인
    return ContentService.createTextOutput('no');
  }
  var s = SpreadsheetApp.getActiveSheet();
  var headers = ['날짜','이름','점수','완주시간','오답단어','출제범위','출제개수','문제유형'];

    s.appendRow(headers);
  }
  s.appendRow([new Date(), d.name, d.score, d.timeStr, (d.wrong||[]).join(', '),
               d.range || '', d.count || '', d.qtype || '']);

}

function doGet(e){                                  // 짧은 링크 저장/조회(GET, 선택 기능)
  var cb = e.parameter.callback || 'callback';
  var out = function(body){
    return ContentService.createTextOutput(cb + '(' + body + ')').setMimeType(ContentService.MimeType.JAVASCRIPT);
  };
  if(e.parameter.token !== '${dc.token}') return out('null');

  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName('VocaTestLinks');
  if(!sh){ sh = ss.insertSheet('VocaTestLinks'); sh.appendRow(['key','payload','저장시각']); }
  var key = e.parameter.key;

  if(e.parameter.action === 'store'){                // 테스트 만들 때: 단어 데이터를 시트에 저장
    var rows = sh.getDataRange().getValues();
    var found = false;
    for(var i=1;i<rows.length;i++){
      if(rows[i][0] === key){ sh.getRange(i+1,2).setValue(e.parameter.payload); sh.getRange(i+1,3).setValue(new Date()); found = true; break; }
    }
    if(!found) sh.appendRow([key, e.parameter.payload, new Date()]);
    return out('"ok"');
  }
  if(e.parameter.action === 'fetch'){                // 학생이 링크 열 때: 저장해둔 단어 데이터 조회
    var rows2 = sh.getDataRange().getValues();
    for(var j=1;j<rows2.length;j++){
      if(rows2[j][0] === key) return out(rows2[j][1]);
    }
  }
  return out('null');
}`;

  root.innerHTML = `
    <section class="anim-slide rounded-3xl bg-white p-5 shadow-card">
      <h2 class="mb-1 text-base font-extrabold">결과 받기 · 구글시트</h2>
      <p class="mb-3 text-xs leading-relaxed text-slate-400">학생이 완주하면 결과가 선생님의 <b>구글시트에 자동 기록</b>돼요. 비밀 토큰이 맞을 때만 저장되어 스팸을 막습니다.</p>

      <label class="mb-1.5 flex items-center gap-2 text-xs font-bold text-slate-500">
        <input id="d-on" type="checkbox" ${useHook?'checked':''} class="h-4 w-4 accent-brand-500" />
        구글시트로 결과 자동 전송 사용
      </label>

      <div id="d-detail" class="${useHook?'':'pointer-events-none opacity-40'}">
        <label class="mb-1 mt-3 block text-xs font-bold text-slate-500">① 웹훅 URL <span class="font-normal text-slate-400">(Apps Script 배포 주소)</span></label>
        <input id="d-url" value="${esc(dc.url||'')}" placeholder="https://script.google.com/macros/s/.../exec" class="mb-3 w-full rounded-xl border-2 border-slate-100 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-brand-400" />

        <label class="mb-1 block text-xs font-bold text-slate-500">② 비밀 토큰 <span class="font-normal text-slate-400">(아래 코드와 동일해야 함)</span></label>
        <div class="mb-3 flex gap-2">
          <input id="d-token" value="${esc(dc.token)}" class="w-full rounded-xl border-2 border-slate-100 bg-slate-50 px-4 py-3 font-mono text-xs outline-none focus:border-brand-400" />
          <button id="d-newtoken" class="btn3d shrink-0 bg-slate-200 px-3 text-xs font-bold text-slate-600" style="--btn-edge:#cbd5e1">새로</button>
        </div>

        <button id="d-save" class="btn3d w-full bg-brand-500 py-3 text-sm text-white" style="--btn-edge:#4338ca">저장</button>

        <div class="mt-4 rounded-2xl bg-slate-50 p-4">
          <p class="mb-2 text-xs font-bold text-slate-600">③ 구글시트 연결 방법</p>
          <ol class="list-decimal space-y-1 pl-4 text-[11px] leading-relaxed text-slate-500">
            <li>구글시트 새로 만들기 → 상단 <b>확장 프로그램 → Apps Script</b></li>
            <li>아래 코드를 통째로 붙여넣기 (토큰이 이미 들어가 있어요)</li>
            <li><b>배포 → 새 배포 → 유형 ‘웹 앱’ → 액세스 ‘모든 사용자’ → 배포</b></li>
            <li>나오는 <b>/exec</b> 주소를 위 ① 칸에 붙여넣고 저장</li>
          </ol>
          <div class="mt-2 flex items-center justify-between">
            <span class="text-[11px] font-bold text-slate-500">Apps Script 코드</span>
            <button id="d-copycode" class="rounded-lg bg-brand-500 px-3 py-1 text-[11px] font-bold text-white">코드 복사</button>
          </div>
          <pre class="mt-1.5 overflow-x-auto rounded-lg bg-slate-900 p-3 text-[10px] leading-relaxed text-slate-100 no-scrollbar">${esc(guideCode)}</pre>
        </div>

        <div class="mt-3 rounded-2xl bg-grass-50 p-3 text-[11px] leading-relaxed text-grass-700">
          🔒 결과는 <b>선생님 구글시트에만</b> 쌓이고 외부인은 볼 수 없어요. 모든 요청은 비밀 토큰이 맞을 때만 처리되고, 시트 전체나 구글 계정 자체에는 접근할 수 없습니다(정해진 딱 한 칸만 주고받음). "🔗 짧은 링크 만들기"를 쓰면 단어 데이터를 이 시트의 별도 탭(VocaTestLinks)에 저장해두고 짧은 키로 불러오는 방식이라 토큰이 없으면 조회도 안 돼요.
        </div>
      </div>
    </section>
  `;

  $('#d-on').onchange=(e)=>{ const c=deliveryCfg(); c.mode = e.target.checked ? 'hook':'none'; saveDelivery(c); renderResultsTab(root); };

  if(useHook){
    $('#d-url').oninput   =()=>{ const c=deliveryCfg(); c.url=$('#d-url').value.trim(); saveDelivery(c); };
    $('#d-token').oninput =()=>{ const c=deliveryCfg(); c.token=$('#d-token').value.trim(); saveDelivery(c); };
    $('#d-newtoken').onclick=()=>{ const c=deliveryCfg(); c.token=newToken(); saveDelivery(c); renderResultsTab(root); };
    $('#d-save').onclick=()=>{ const c=deliveryCfg(); c.url=$('#d-url').value.trim(); c.token=$('#d-token').value.trim()||newToken(); saveDelivery(c); toast('저장했어요 ✅'); renderResultsTab(root); };
    $('#d-copycode').onclick=async()=>{ (await copyText(guideCode))? toast('코드를 복사했어요 📋'):toast('복사 실패','bad'); };
  }
}
