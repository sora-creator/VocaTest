// 짧은 링크(?r=1&rv=웹훅주소&rt=토큰)면 원격에서 payload를 받아온 뒤 initStudentApp 실행
function StudentApp(sessionKey, dataStr, remote){
  if(dataStr){
    initStudentApp(sessionKey, b64dec(dataStr));
    return;
  }
  if(remote && remote.rv){
    app.innerHTML = `
      <div class="flex min-h-[70dvh] flex-col items-center justify-center text-center anim-in">
        <div class="mb-4 grid h-16 w-16 place-items-center rounded-3xl bg-brand-500 text-3xl shadow-soft floaty">📚</div>
        <p class="text-sm font-bold text-slate-400">테스트를 불러오는 중…</p>
      </div>`;
    const url = remote.rv + '?action=fetch&key=' + encodeURIComponent(sessionKey) + '&token=' + encodeURIComponent(remote.rt||'');
    jsonpFetch(url).then(payload=>{
      if(!payload){ return renderExpired('테스트 정보를 불러오지 못했어요. 인터넷 연결을 확인하거나 링크가 올바른지 확인해 주세요.'); }
      initStudentApp(sessionKey, payload);
    });
    return;
  }
  renderExpired('테스트 정보를 불러올 수 없어요. 링크가 올바른지 확인해 주세요.');
}

function initStudentApp(sessionKey, payload){
  // 1) 데이터 확인
  if(!payload || !payload.w || !payload.w.length){
    return renderExpired('테스트 정보를 불러올 수 없어요. 링크가 올바른지 확인해 주세요.');
  }

  // 2) 위·변조 검증 (만료일/단어를 임의로 바꾼 링크 차단)
  if(!verifyPayload(payload)){
    return renderExpired('유효하지 않은 링크예요. 링크가 손상되었거나 변경되었을 수 있어요.');
  }

  // 3) 만료 확인 — 링크 만료일이 지났거나(모든 기기), 이 브라우저에서 선생님이 만료함
  if(payload.exp && Date.now() > payload.exp){
    const ed = new Date(payload.exp);
    return renderExpired(`이 테스트는 ${ed.getFullYear()}년 ${ed.getMonth()+1}월 ${ed.getDate()}일에 만료되었어요.`);
  }
  const rec = DB.sessions().find(s=>s.key===sessionKey);
  if(rec && rec.status==='expired'){ return renderExpired('이 테스트는 선생님이 마감했어요.'); }

  const words = payload.w.map(x=>({en:x.e, ko:x.k}));
  const cfg = { mode: payload.mode||'mixed', sec: payload.sec||4, name: payload.n||'', dm: payload.dm||'', dv: payload.dv||'', dt: payload.dt||'', rng: payload.rng||'', cnt: payload.cnt||'' };

  renderGate();

  /* ----- 이름 입력 ----- */
  function renderGate(){
    app.innerHTML = `
      <div class="flex min-h-[70dvh] flex-col items-center justify-center text-center anim-in">
        <div class="mb-4 grid h-20 w-20 place-items-center rounded-3xl bg-brand-500 text-4xl shadow-soft floaty">📚</div>
        <p class="text-xs font-black tracking-widest text-brand-400">VOCATEST</p>
        <h1 class="text-2xl font-extrabold">영단어 테스트</h1>
        ${cfg.name? `<p class="mt-1 font-semibold text-brand-500">${esc(cfg.name)}</p>`:''}
        <p class="mt-1 text-sm text-slate-400">단어 ${words.length}개 · ${({mc:'객관식',spelling:'주관식',mixed:'혼합'})[cfg.mode]}</p>
        <div class="mt-7 w-full max-w-xs">
          <input id="s-name" placeholder="이름을 입력하세요" class="w-full rounded-2xl border-2 border-slate-100 bg-white px-5 py-4 text-center text-lg font-bold shadow-sm outline-none focus:border-brand-400" />
          <div class="mt-4 rounded-2xl bg-white px-4 py-3 shadow-sm">
            <label class="mb-1.5 block text-sm font-bold text-slate-500">⏱ 틀렸을 때 공부 시간: <span id="s-secval" class="text-brand-600">${cfg.sec}초</span></label>
            <input id="s-sec" type="range" min="2" max="10" value="${cfg.sec}" class="w-full accent-brand-500" />
          </div>
          <button id="s-start" class="btn3d mt-3 w-full bg-grass-500 py-4 text-lg text-white" style="--btn-edge:#15803d">시작하기 🚀</button>
        </div>
        <p class="mt-6 max-w-xs text-sm leading-relaxed text-slate-500 sm:max-w-sm">틀린 단어는 <b>맞출 때까지 반복</b>돼요.<br/>끝까지 완주하면 결과 카드가 나와요!</p>
      </div>`;
    const nameEl=$('#s-name'); nameEl.focus();
    const secEl=$('#s-sec'); secEl.oninput=()=>{ cfg.sec=+secEl.value; $('#s-secval').textContent=secEl.value+'초'; };
    function start(){
      const name=nameEl.value.trim();
      if(!name){ toast('이름을 입력해 주세요','bad'); nameEl.focus(); return; }
      startQuiz(name);
    }
    $('#s-start').onclick=start;
    nameEl.addEventListener('keydown',e=>{ if(e.key==='Enter') start(); });
  }

  /* ----- 퀴즈 엔진 ----- */
  function startQuiz(studentName){
    // 각 단어 → 문제 객체 (혼합이면 랜덤 유형)
    const questions = words.map((w,i)=>{
      let type = cfg.mode;
      if(cfg.mode==='mixed') type = Math.random()<0.5 ? 'mc' : 'spelling';
      return { id:i, en:w.en, ko:w.ko, type };
    });

    const state = {
      name: studentName,
      total: questions.length,
      queue: shuffle(questions),      // 맞출 때까지 남는 큐
      firstResult: {},                // id -> 최초 정답 여부
      wrongSet: new Set(),            // 오답노트 (id)
      mastered: new Set(),
      attempts: 0,
      start: Date.now(),
    };

    nextQuestion(state);
  }

  function nextQuestion(state){
    if(state.queue.length===0){ return renderResult(state); }
    const q = state.queue[0];
    renderQuestion(state, q);
  }

  function renderQuestion(state, q){
    const progress = Math.round(state.mastered.size / state.total * 100);
    const remain = state.queue.length;

    let body;
    if(q.type==='mc'){
      // 보기: 다른 단어들의 뜻 3개 + 정답
      const others = words.filter(w=>w.ko!==q.ko);
      const distract = shuffle(others).slice(0,3).map(w=>w.ko);
      const options = shuffle([q.ko, ...distract]);
      body = `
        <div class="mb-6 text-center">
          <p class="mb-2 text-sm font-bold text-slate-400">다음 단어의 뜻은?</p>
          <div class="rounded-3xl bg-white px-6 py-8 text-3xl font-black shadow-card">${esc(q.en)}</div>
        </div>
        <div class="grid gap-2.5" id="opts">
          ${options.map((o,i)=>`<button data-opt="${esc(o)}" class="btn3d bg-white py-4 text-left px-5 text-base font-bold text-slate-700" style="--btn-edge:#e2e8f0">
            <span class="mr-2 text-brand-400">${String.fromCharCode(65+i)}.</span>${esc(o)}</button>`).join('')}
        </div>`;
    } else {
      body = `
        <div class="mb-6 text-center">
          <p class="mb-2 text-sm font-bold text-slate-400">뜻에 맞는 영단어를 입력하세요</p>
          <div class="rounded-3xl bg-white px-6 py-8 text-2xl font-black shadow-card">${esc(q.ko)}</div>
        </div>
        <input id="sp-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
          placeholder="영어 스펠링 입력" class="w-full rounded-2xl border-2 border-slate-100 bg-white px-5 py-4 text-center text-xl font-bold shadow-sm outline-none focus:border-brand-400" />
        <button id="sp-submit" class="btn3d mt-3 w-full bg-brand-500 py-4 text-white" style="--btn-edge:#4338ca">제출하기</button>`;
    }

    app.innerHTML = `
      <div class="anim-slide">
        <header class="mb-4 flex items-center gap-3">
          <div class="text-sm font-black text-slate-500">${esc(state.name)}</div>
          <div class="progressbar h-2.5 flex-1 overflow-hidden rounded-full bg-slate-100"><i style="width:${progress}%"></i></div>
          <div class="text-xs font-black text-brand-500">${state.mastered.size}/${state.total}</div>
        </header>
        ${remain>1 ? `<div class="mb-3 text-center text-[11px] font-bold text-slate-300">남은 문제 ${remain}개 · 틀리면 다시 나와요</div>`:''}
        ${body}
      </div>`;

    if(q.type==='mc'){
      app.querySelectorAll('[data-opt]').forEach(b=> b.onclick=()=> answer(state,q, b.dataset.opt===q.ko, b));
    } else {
      const inp=$('#sp-input'); inp.focus();
      const submit=()=>{
        const val=inp.value.trim();
        if(!val){ toast('스펠링을 입력하세요','bad'); return; }
        const ok = val.toLowerCase() === q.en.trim().toLowerCase();
        answer(state,q,ok,null);
      };
      $('#sp-submit').onclick=submit;
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
    }
  }

  function answer(state, q, correct, btnEl){
    state.attempts++;
    // 최초 시도 결과 기록
    if(!(q.id in state.firstResult)) state.firstResult[q.id] = correct;

    if(correct){
      beep(true);
      // 큐에서 제거 + 마스터
      state.queue.shift();
      state.mastered.add(q.id);
      showFeedback(true, q, ()=> nextQuestion(state), btnEl);
    } else {
      beep(false);
      state.wrongSet.add(q.id);
      // 틀리면 큐 뒤로 보내 다시 출제
      const item = state.queue.shift();
      state.queue.push(item);
      showFeedback(false, q, ()=> nextQuestion(state), btnEl);
    }
  }

  function showFeedback(correct, q, done, btnEl){
    if(correct){
      // 초록 피드백 + 즉시 다음
      if(btnEl){ btnEl.style.setProperty('--btn-edge','#15803d'); btnEl.classList.remove('bg-white','text-slate-700'); btnEl.classList.add('bg-grass-500','text-white','anim-pop'); }
      const bar=document.createElement('div');
      bar.className='fixed inset-x-0 bottom-0 z-40 anim-slide';
      bar.innerHTML=`<div class="mx-auto max-w-md p-4"><div class="flex items-center gap-3 rounded-2xl bg-grass-500 px-5 py-4 text-white shadow-card">
        <span class="text-2xl">🎉</span><b class="text-lg">정답이에요!</b></div></div>`;
      document.body.appendChild(bar);
      setTimeout(()=>{ bar.remove(); done(); }, 650);
    } else {
      // 빨강 + 정답 공개 + 공부 타이머
      const container=document.querySelector('#app > div') || app;
      container.classList.add('anim-shake');
      let sec=cfg.sec;
      const panel=document.createElement('div');
      panel.className='fixed inset-x-0 bottom-0 z-40 anim-slide';
      panel.innerHTML=`
        <div class="mx-auto max-w-md p-4">
          <div class="rounded-3xl bg-coral-50 p-5 shadow-card ring-1 ring-coral-100">
            <div class="mb-2 flex items-center gap-2 text-coral-600"><span class="text-xl">❌</span><b>아쉬워요! 정답을 외워봐요</b></div>
            <div class="rounded-2xl bg-white px-5 py-4 text-center shadow-sm">
              <span class="text-2xl font-black text-slate-800">${esc(q.en)}</span>
              <span class="mx-2 text-slate-300">=</span>
              <span class="text-xl font-bold text-brand-600">${esc(q.ko)}</span>
            </div>
            <div class="mt-3 progressbar h-2 overflow-hidden rounded-full bg-white"><i id="study-bar" style="width:0%;background:#fb7185"></i></div>
            <button id="fb-next" class="btn3d mt-3 w-full bg-slate-300 py-3.5 text-white" style="--btn-edge:#cbd5e1" disabled>
              <span id="fb-label">${sec}초 후 계속…</span>
            </button>
            <div class="mt-3 flex items-center gap-2">
              <span class="shrink-0 text-sm font-bold text-slate-500">⏱ 공부 시간</span>
              <input id="fb-sec" type="range" min="2" max="10" value="${sec}" class="w-full accent-coral-500" />
              <span id="fb-secval" class="w-10 shrink-0 text-right text-sm font-black text-coral-500">${sec}초</span>
            </div>
          </div>
        </div>`;
      document.body.appendChild(panel);

      const bar=panel.querySelector('#study-bar');
      const btn=panel.querySelector('#fb-next');
      const label=panel.querySelector('#fb-label');
      const secSlider=panel.querySelector('#fb-sec');
      const secVal=panel.querySelector('#fb-secval');
      const t0=Date.now();
      let dur=sec*1000, lock=Math.min(1200, dur);
      let autoTimer=setTimeout(()=>{ if(document.body.contains(panel) && !btn.disabled) go(); }, dur+2500);

      secSlider.oninput=()=>{
        sec=+secSlider.value; cfg.sec=sec; secVal.textContent=sec+'초'; // 이후 문제의 기본값으로도 반영
        dur=sec*1000; lock=Math.min(1200, dur);
        clearTimeout(autoTimer);
        const elapsed=Date.now()-t0;
        autoTimer=setTimeout(()=>{ if(document.body.contains(panel) && !btn.disabled) go(); }, Math.max(0, dur+2500-elapsed));
      };

      const timer=setInterval(()=>{
        const el=Date.now()-t0; const pct=Math.min(100, el/dur*100);
        bar.style.width=pct+'%';
        const left=Math.ceil((dur-el)/1000);
        if(el>=lock){
          btn.disabled=false; btn.classList.remove('bg-slate-300'); btn.classList.add('bg-brand-500');
          btn.style.setProperty('--btn-edge','#4338ca');
          label.textContent = left>0 ? `다음 문제 → (${left})` : '다음 문제 →';
        }
        if(el>=dur){ clearInterval(timer); label.textContent='다음 문제 →'; }
      }, 80);

      const go=()=>{ if(btn.disabled) return; clearInterval(timer); clearTimeout(autoTimer); panel.remove(); container.classList.remove('anim-shake'); done(); };
      btn.onclick=go;
    }
  }

  /* ----- 결과 카드 ----- */
  function renderResult(state){
    const firstCorrect = Object.values(state.firstResult).filter(Boolean).length;
    const pct = Math.round(firstCorrect/state.total*100);
    const ms = Date.now()-state.start;
    const mm = Math.floor(ms/60000), ss = Math.floor((ms%60000)/1000);
    const timeStr = mm>0 ? `${mm}분 ${ss}초` : `${ss}초`;
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const wrongWords = [...state.wrongSet].map(id=>words[id].en);

    const grade = pct===100 ? {e:'🏆',t:'완벽해요!',c:'text-amber-500'}
                : pct>=80  ? {e:'🎉',t:'훌륭해요!',c:'text-grass-600'}
                : pct>=60  ? {e:'👍',t:'잘했어요!',c:'text-brand-600'}
                :            {e:'💪',t:'다음엔 더!',c:'text-coral-500'};

    if(pct>=60) confetti();

    const report =
`📚 영단어 테스트 결과
👤 이름: ${state.name}
📅 날짜: ${dateStr}
✅ 최초 점수: ${firstCorrect}/${state.total} (${pct}%)
🔁 총 시도: ${state.attempts}문제
⏱️ 완주 시간: ${timeStr}${wrongWords.length? `\n📝 오답 단어: ${wrongWords.join(', ')}`:'\n✨ 오답 없음!'}
— VocaTest`;

    const qtype = ({mc:'객관식',spelling:'주관식',mixed:'혼합'})[cfg.mode] || cfg.mode;
    const result = { name: state.name, score: `${firstCorrect}/${state.total} (${pct}%)`,
                     timeStr, attempts: state.attempts, wrong: wrongWords, date: dateStr, report,
                     range: cfg.rng||'', count: cfg.cnt||'', qtype };
    const autoSend = !!cfg.dm;

    app.innerHTML = `
      <div class="anim-in flex flex-col items-center">
        <div id="card" class="w-full overflow-hidden rounded-3xl bg-white p-6 shadow-card">
          <div class="text-center">
            <div class="mx-auto mb-2 grid h-20 w-20 place-items-center rounded-full bg-gradient-to-br from-brand-100 to-grass-50 text-5xl">${grade.e}</div>
            <div class="text-lg font-black ${grade.c}">${grade.t}</div>
            <div class="mt-1 text-sm font-bold text-slate-400">테스트 완주 🎊</div>
          </div>

          <div class="my-5 rounded-2xl bg-slate-50 p-5 text-center">
            <div class="text-xs font-bold text-slate-400">최초 점수</div>
            <div class="mt-1 text-5xl font-black text-slate-800">${firstCorrect}<span class="text-2xl text-slate-300">/${state.total}</span></div>
            <div class="mt-1 text-sm font-black ${grade.c}">${pct}점</div>
          </div>

          <div class="grid grid-cols-2 gap-2 text-center">
            <div class="rounded-2xl bg-brand-50 py-3">
              <div class="text-[11px] font-bold text-brand-400">완주 시간</div>
              <div class="text-lg font-black text-brand-600">${timeStr}</div>
            </div>
            <div class="rounded-2xl bg-slate-50 py-3">
              <div class="text-[11px] font-bold text-slate-400">총 시도</div>
              <div class="text-lg font-black text-slate-600">${state.attempts}문제</div>
            </div>
          </div>

          <div class="mt-4 flex items-center justify-between border-t border-slate-100 pt-4 text-sm">
            <span class="font-bold text-slate-400">${esc(state.name)}</span>
            <span class="font-mono text-xs text-slate-300">${dateStr}</span>
          </div>

          ${wrongWords.length? `<div class="mt-3 rounded-2xl bg-coral-50 p-3">
            <div class="mb-1 text-[11px] font-black text-coral-500">📝 오답 단어 (다시 복습!)</div>
            <div class="text-sm font-bold text-coral-600">${wrongWords.map(esc).join(', ')}</div>
          </div>`:`<div class="mt-3 rounded-2xl bg-grass-50 p-3 text-center text-sm font-black text-grass-600">✨ 한 번도 안 틀렸어요! 대단해요</div>`}
        </div>

        <div class="mt-4 grid w-full grid-cols-1 gap-2.5">
          ${autoSend? `<div id="r-send" class="rounded-2xl bg-slate-50 py-3 text-center text-sm font-bold text-slate-400">📡 선생님께 결과 전송 중…</div>`
                     : `<button id="r-copy" class="btn3d bg-grass-500 py-4 text-white" style="--btn-edge:#15803d">📋 결과 복사해서 선생님께 보내기</button>`}
          <div id="r-copy-fallback"></div>
          <button id="r-again" class="btn3d py-3.5 ${autoSend?'bg-grass-500 text-white':'bg-white text-slate-600'}" style="--btn-edge:${autoSend?'#15803d':'#e2e8f0'}">재시험 보기 🔄</button>
        </div>
        ${!autoSend? `<p class="mt-4 text-center text-[11px] text-slate-400">위 카드를 캡처해서 보내도 좋아요 📸</p>`:''}
      </div>`;

    const rcopy=$('#r-copy'); if(rcopy) rcopy.onclick=async()=>{ (await copyText(report))? toast('결과를 복사했어요! 카톡에 붙여넣으세요 💬'):toast('복사 실패','bad'); };
    $('#r-again').onclick=()=> renderGate();

    if(autoSend){
      sendResult(cfg.dm, cfg.dv, cfg.dt, result).then(ok=>{
        const el=$('#r-send'); if(!el) return;
        if(ok){ el.className='rounded-2xl bg-grass-50 py-3 text-center text-sm font-bold text-grass-600'; el.textContent='✅ 선생님께 결과가 전송됐어요!'; }
        else {
          el.className='rounded-2xl bg-amber-50 py-3 text-center text-sm font-bold text-amber-600'; el.textContent='⚠️ 자동 전송에 실패했어요';
          const fb=$('#r-copy-fallback');
          if(fb){
            fb.innerHTML = `<button id="r-copy" class="btn3d w-full bg-grass-500 py-4 text-white" style="--btn-edge:#15803d">📋 결과 복사해서 선생님께 보내기</button>`;
            $('#r-copy').onclick=async()=>{ (await copyText(report))? toast('결과를 복사했어요! 카톡에 붙여넣으세요 💬'):toast('복사 실패','bad'); };
          }
        }
      });
    }
  }
}

/* ----- 만료/오류 화면 ----- */
function renderExpired(msg){
  app.innerHTML = `
    <div class="flex min-h-[75dvh] flex-col items-center justify-center text-center anim-in">
      <div class="mb-4 grid h-20 w-20 place-items-center rounded-3xl bg-coral-50 text-4xl">🔒</div>
      <h1 class="text-xl font-extrabold text-slate-700">만료된 테스트입니다</h1>
      <p class="mt-2 max-w-xs text-sm text-slate-400">${esc(msg)}</p>
      <p class="mt-6 text-xs text-slate-300">궁금한 점은 선생님께 문의해 주세요.</p>
    </div>`;
}

/* 시작 */
boot();
</script>
</body>
</html>
